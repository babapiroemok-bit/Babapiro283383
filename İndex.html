<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Discord Live Profile</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
    overflow: hidden;
}

/* GIF arka plan */
.bg {
    position: fixed;
    width: 100%;
    height: 100%;
    background: url('https://media.giphy.com/media/ICOgUNjpvO0PC/giphy.gif') no-repeat center center/cover;
    z-index: -1;
    filter: blur(5px) brightness(0.5);
}

.card {
    background: rgba(35,39,42,0.85);
    width: 320px;
    border-radius: 15px;
    padding: 20px;
    text-align: center;
    backdrop-filter: blur(10px);
}

.avatar {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    border: 4px solid #5865F2;
}

.username {
    font-size: 22px;
    margin-top: 10px;
    font-weight: bold;
}

.status {
    margin-top: 8px;
    font-size: 14px;
}

.dot {
    display: inline-block;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    margin-right: 5px;
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="card">
    <img id="avatar" class="avatar">
    <div id="username" class="username">Yükleniyor...</div>
    <div id="status" class="status"></div>
</div>

<script>
// 🔥 BURAYA DISCORD USER ID KOY
const userId = "1457350623770054758 ";

// Lanyard API
fetch(`https://api.lanyard.rest/v1/users/${userId}`)
.then(res => res.json())
.then(data => {
    const user = data.data.discord_user;
    const status = data.data.discord_status;

    // Avatar
    document.getElementById("avatar").src =
        `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png`;

    // Username
    document.getElementById("username").innerText =
        user.username + "#" + user.discriminator;

    // Status renk
    let color = "gray";
    let text = "Offline";

    if(status === "online"){
        color = "lime";
        text = "Online";
    }
    else if(status === "idle"){
        color = "orange";
        text = "Boşta";
    }
    else if(status === "dnd"){
        color = "red";
        text = "Rahatsız Etmeyin";
    }

    document.getElementById("status").innerHTML =
        `<span class="dot" style="background:${color}"></span>${text}`;
});
</script>

</body>
</html>
